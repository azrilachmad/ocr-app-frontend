name: Deploy to Production

on:
  push:
    branches: [main]

env:
  SERVER_HOST: ${{ secrets.SERVER_HOST }}
  SERVER_USER: ${{ secrets.SERVER_USER }}
  DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

jobs:
  deploy:
    name: Deploy to Ubuntu Server
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ---- Build Frontend ----
      - name: Install & Build Frontend
        working-directory: ./Frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          npm install --legacy-peer-deps
          npm run build

      # ---- Build KnowledgeBase ----
      - name: Install & Build KnowledgeBase
        working-directory: ./KnowledgeBase
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          npm install --legacy-peer-deps
          npm run build

      # ---- Deploy via SSH ----
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "📦 Installing Backend dependencies..."
            cd Backend
            npm install --production --legacy-peer-deps
            cd ..

            echo "🔄 Restarting PM2 processes..."
            pm2 reload ecosystem.config.json --env production

            echo "✅ Deployment complete!"
            pm2 status

      # ---- Copy built assets to server ----
      - name: Upload Frontend build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "Frontend/dist/"
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true

      - name: Upload KnowledgeBase build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "KnowledgeBase/dist/"
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true

      # ---- Post-deploy reload ----
      - name: Reload PM2 after asset upload
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            pm2 reload synchro-scan-frontend synchro-scan-knowledgebase
            echo "✅ Frontend & KnowledgeBase reloaded with fresh build assets"
